model:
  provider: custom:my-codex
  default: gpt-5.6-terra
agent:
  reasoning_effort: high
custom_providers:
  - name: my-codex
    base_url: https://jojocode.com/v1
    key_env: OPENAI_API_KEY
    api_mode: codex_responses
    model: gpt-5.6-terra
fallback_providers:
  - provider: deepseek
    model: deepseek-chat
platforms:
  api_server:
    port: 8642
    enabled: true
mcp_servers: {}
display:
  language: zh
memory:
  directory: 'D:\AI\furina\memory'
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
